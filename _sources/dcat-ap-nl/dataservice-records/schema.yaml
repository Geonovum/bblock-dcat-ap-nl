$schema: 'https://json-schema.org/draft/2020-12/schema'
$id: 'https://geonovum.bbr.dcat.dataservice-records.json'
title: DCAT DataService OGC API record definition
description: DCAT DataService OGC API record definition

# allOf:
#   - $ref: bblocks://geonovum.bbr.dcat.dcat-dataservice-records

required:
  - conformsTo
  # - type
  # - time
  # - geometry
  # - properties
  # - links
properties:
  properties:
    type: object
    required:
      - title
      - description
    properties:
      title:
        $ref: '#/definitions/MultilingualString'
        description: A human-readable name given to the resource.
      description:
        $ref: '#/definitions/MultilingualString'
        description: A free-text account of the resource.
  links:
    type: array
    minItems: 1
    items:
      $ref: '#/definitions/Link'
  # linkTemplates:
  #   type: array
  #   items:
  #     $ref: 'https://schemas.opengis.net/ogcapi/records/part1/1.0/openapi/schemas/linkTemplate.yaml'  
definitions:
  Link:
    title: Link object definition
    description: Link object definition including distribution
    type: object
    required:
      - href
    properties:
      href:
        type: string
        format: uri
      rel:
        type: string
      type:
        type: string
      title:
        type: string
  LanguageMap:
    type: object
    description: A language-mapped string where keys are BCP 47 language tags and values are the localized strings.
    patternProperties:
      ^[a-zA-Z]{2,8}(-[a-zA-Z0-9]{2,8})*$:
        type: string
    additionalProperties: false
  MultilingualString:
    oneOf:
      - type: string
      - $ref: '#/definitions/LanguageMap'
